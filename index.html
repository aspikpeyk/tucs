<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tucs</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      font-family:'Cinzel', serif;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow-x:hidden;
      padding:24px;

      background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
        url("background.jpg");
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
    }

    .card{
      width:min(92vw, 760px);
      min-height:360px;
      padding:56px 40px;
      border-radius:28px;
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 0 70px rgba(255,255,255,0.35);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    h1{
      font-size:clamp(3rem, 7vw, 6rem);
      line-height:0.95;
      letter-spacing:3px;
      color:#f5eeff;
      text-shadow:0 0 18px rgba(255,255,255,0.35);
      margin-bottom:35px;
      word-break:break-word;
    }

    .socials{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
    }

    .social-link{
      width:64px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      font-size:1.6rem;
      color:#fff;
      text-decoration:none;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }

    .social-link:hover{
      transform:translateY(-6px) scale(1.07);
      background:rgba(255,255,255,0.15);
      box-shadow:0 0 25px rgba(255,255,255,0.35);
    }

    /* Tablet */
    @media (max-width: 1024px){
      body{
        padding:20px;
        background-image:
          linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
          url("tablet.jpg");
      }

      .card{
        width:min(94vw, 680px);
        min-height:320px;
        padding:48px 32px;
        border-radius:24px;
      }

      h1{
        font-size:clamp(2.7rem, 8vw, 5rem);
        margin-bottom:30px;
      }

      .socials{
        gap:18px;
      }

      .social-link{
        width:60px;
        height:60px;
        font-size:1.45rem;
      }
    }

    /* Phone */
    @media (max-width: 768px){
      body{
        padding:18px;
        background-image:
          linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.75)),
          url("phone.jpg");
      }

      .card{
        width:100%;
        min-height:280px;
        padding:40px 24px;
        border-radius:22px;
      }

      h1{
        font-size:clamp(2.3rem, 10vw, 4.2rem);
        letter-spacing:2px;
        margin-bottom:26px;
      }

      .socials{
        gap:16px;
      }

      .social-link{
        width:56px;
        height:56px;
        font-size:1.3rem;
      }
    }

    @media (max-width: 480px){
      body{
        padding:14px;
      }

      .card{
        min-height:auto;
        padding:32px 18px;
        border-radius:20px;
      }

      h1{
        font-size:clamp(2rem, 12vw, 3.2rem);
        letter-spacing:1.5px;
        margin-bottom:22px;
      }

      .socials{
        gap:14px;
      }

      .social-link{
        width:52px;
        height:52px;
        font-size:1.15rem;
      }
    }

    @media (hover:none){
      .social-link:hover{
        transform:none;
        background:rgba(255,255,255,0.06);
        box-shadow:none;
      }
    }
  </style>
</head>
<body>

<audio id="bgMusic" loop playsinline preload="auto">
  <source src="background.mp3" type="audio/mpeg">
</audio>

  <div class="card">
    <h1>Tucs</h1>

    <div class="socials">
      <a class="social-link" href="https://www.facebook.com/tucs.wong?mibextid=wwXIfr&rdid=2hrlOPTpXJnl2q4y&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F18Mpf9n44A%2F%3Fmibextid%3DwwXIfr#" target="_blank" aria-label="Facebook">
        <i class="bi bi-facebook"></i>
      </a>
      <a class="social-link" href="https://www.instagram.com/x0tcs" target="_blank" aria-label="Instagram">
        <i class="bi bi-instagram"></i>
      </a>
    </div>
  </div>

<script>
const music = document.getElementById("bgMusic");

async function unlockMusic() {
  try {
    await music.play();
    document.removeEventListener("click", unlockMusic);
    document.removeEventListener("touchstart", unlockMusic);
  } catch (err) {
    console.log(err);
  }
}

document.addEventListener("click", unlockMusic);
document.addEventListener("touchstart", unlockMusic);
</script>

</body>
</html>
